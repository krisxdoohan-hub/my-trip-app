<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trippie - 旅遊行程規劃器</title>
    <link rel="manifest" href="./manifest.json">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- Excel Library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Mammoth (移植原版：用於解析 Word DOCX) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .map-container { height: 100%; width: 100%; transition: all 0.3s ease; }
        .sidebar { scrollbar-width: thin; scrollbar-color: #e5e7eb transparent; }
        .spot-card:hover .delete-btn { opacity: 1; }
        #map { z-index: 1; height: 100%; width: 100%; background: #f8fafc; }
        #map-section { position: relative; transition: all 0.3s ease; }
        
        /* 響應式佈局調整 */
        @media (max-width: 1024px) {
            main { flex-direction: column; }
            #map-section { height: 40vh; min-height: 250px; width: 100% !important; flex-shrink: 0; }
            #itinerary-section { width: 100% !important; flex-grow: 1; border-l: 0; border-t: 1px solid #e2e8f0; }
        }

        .custom-marker {
            background-color: #f97316;
            color: white;
            border-radius: 50%;
            text-align: center;
            font-weight: bold;
            line-height: 24px;
            border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>

</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden h-screen flex flex-col">

    <!-- 導覽列 -->
    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shrink-0 shadow-sm z-50">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-map-trifold text-blue-600 text-3xl"></i>
            <h1 id="app-title" contenteditable="true" class="text-xl font-bold tracking-tight outline-none focus:text-blue-600">我的東京之旅</h1>
        </div>
        <div class="flex items-center gap-2">
            <!-- 地圖切換 -->
            <button onclick="toggleMap()" class="p-2 hover:bg-slate-100 rounded-xl transition text-slate-600 flex items-center gap-2 border border-slate-200" title="切換地圖模式">
                <i class="ph ph-map-trifold text-xl"></i>
                <span class="hidden md:inline font-bold text-sm">地圖開關</span>
            </button>
            
            <!-- 匯出按鈕 -->
            <div class="relative group">
                <button class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold hover:bg-slate-900 transition flex items-center gap-2 shadow-lg">
                    <i class="ph ph-export"></i>
                    <span class="hidden sm:inline">匯出行程</span>
                    <i class="ph ph-caret-down"></i>
                </button>
                <div class="absolute right-0 top-full mt-2 w-48 bg-white shadow-2xl rounded-2xl border border-slate-100 py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[100] transform origin-top-right group-hover:translate-y-1">
                    <button onclick="exportToExcel()" class="w-full text-left px-4 py-3 hover:bg-green-50 flex items-center gap-3 transition">
                        <i class="ph ph-file-xls text-green-500 text-xl"></i>
                        <div>
                            <div class="font-bold text-sm">匯出 Excel</div>
                            <div class="text-[10px] text-slate-400 font-normal">適合數據整理</div>
                        </div>
                    </button>
                    <button onclick="exportToWord()" class="w-full text-left px-4 py-3 hover:bg-blue-50 flex items-center gap-3 transition border-t border-slate-50">
                        <i class="ph ph-file-doc text-blue-500 text-xl"></i>
                        <div>
                            <div class="font-bold text-sm">匯出 Word</div>
                            <div class="text-[10px] text-slate-400 font-normal">適合自由編輯</div>
                        </div>
                    </button>
                </div>
            </div>

            <button onclick="toggleCloudSettings()" class="p-2 hover:bg-slate-100 rounded-full transition ml-2" title="GitHub 同步">
                <i class="ph ph-cloud-arrow-up text-xl text-slate-400"></i>
            </button>
            <button onclick="syncData()" class="p-2 hover:bg-blue-50 text-blue-600 rounded-full transition" title="同步備份">
                <i class="ph ph-arrows-clockwise text-xl"></i>
            </button>
        </div>
    </nav>

    <!-- 雲端設定區 -->
    <div id="cloud-sidebar" class="fixed right-0 top-0 h-full w-80 bg-white shadow-2xl z-[60] transform translate-x-full transition-transform duration-300 p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold">GitHub 雲端同步設定</h2>
            <button onclick="toggleCloudSettings()"><i class="ph ph-x text-2xl"></i></button>
        </div>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">GitHub Token</label>
                <input id="gh-token" type="password" class="w-full border p-2 rounded-lg" placeholder="ghp_xxxx">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">GitHub 帳號/專案名</label>
                <input id="gh-repo" type="text" class="w-full border p-2 rounded-lg" placeholder="username/repo">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">儲存檔名</label>
                <input id="gh-path" type="text" class="w-full border p-2 rounded-lg" value="travel-data.json">
            </div>
            <button onclick="saveConfig()" class="w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-slate-900 transition">儲存設定</button>
            <p class="text-xs text-slate-400">設定將儲存於瀏覽器，同步後數據將永久存儲於您的 GitHub 倉庫。</p>
        </div>
    </div>

    <!-- 主顯示區 -->
    <main class="flex-grow flex overflow-hidden">
        
        <!-- 左側：地圖區 -->
        <div id="map-section" class="flex-grow relative h-full border-r border-slate-200">
            <div id="map" class="w-full h-full"></div>
            <!-- 地圖覆蓋按鈕 -->
            <div class="absolute bottom-6 left-6 z-40 bg-white p-2 rounded-xl shadow-lg border border-slate-200 flex flex-col gap-2">
                <button onclick="mapView.zoomIn()" class="p-2 hover:bg-slate-100 rounded-lg" title="放大"><i class="ph ph-plus"></i></button>
                <button onclick="mapView.zoomOut()" class="p-2 hover:bg-slate-100 rounded-lg" title="縮小"><i class="ph ph-minus"></i></button>
                <button onclick="updateMap()" class="p-2 hover:bg-slate-100 rounded-lg border-t border-slate-100" title="自適應視角"><i class="ph ph-arrows-out"></i></button>
            </div>
        </div>

        <!-- 右側：行程編輯區 -->
        <div id="itinerary-section" class="w-full lg:w-[500px] border-l border-slate-200 bg-white flex flex-col shrink-0 h-full">
            
            <!-- 天數切換 -->
            <div class="border-b border-slate-100 px-4 py-2 flex items-center justify-between bg-slate-50 shrink-0">
                <div class="flex gap-2 overflow-x-auto select-none no-scrollbar" id="day-tabs">
                    <!-- Tabs generated by JS -->
                </div>
                <div class="flex gap-1 ml-2">
                    <button onclick="addDay()" class="p-1.5 bg-blue-100 text-blue-600 rounded-md hover:bg-blue-200"><i class="ph ph-plus-circle"></i></button>
                    <button onclick="removeDay()" class="p-1.5 bg-rose-100 text-rose-600 rounded-md hover:bg-rose-200 text-xs"><i class="ph ph-trash"></i></button>
                </div>
            </div>

            <!-- 行程內容 -->
            <div id="itinerary-list" class="flex-grow overflow-y-auto p-6 sidebar space-y-8">
                <!-- Day content generated by JS -->
            </div>

            <!-- 底部動作 -->
            <div class="p-4 border-t border-slate-100 bg-white shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <button onclick="addSpot()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                    <i class="ph ph-plus-bold"></i>
                    <span>新增景點行程</span>
                </button>
            </div>
        </div>
    </main>

    <!-- 自定義對話框 (替代 prompt/confirm) -->
    <div id="modal-container" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-white rounded-2xl p-6 w-80 shadow-2xl transform scale-90 transition-transform duration-200" id="modal-content">
            <h3 id="modal-title" class="text-lg font-bold mb-2">確認視窗</h3>
            <p id="modal-desc" class="text-slate-500 mb-6">您確定要執行此操作嗎？</p>
            <div id="modal-input-area" class="hidden mb-4">
                <input id="modal-input" type="text" class="w-full border p-2 rounded-lg outline-none focus:border-blue-500" placeholder="請輸入內容...">
            </div>
            <div class="flex gap-2 justify-end">
                <button id="modal-cancel" class="px-4 py-2 text-slate-400 font-medium font-bold">取消</button>
                <button id="modal-confirm" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold active:scale-95 transition-transform">確定</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        /**
         * 全域狀態
         */
        window.records = {
            title: "我的台北行程",
            activeDay: 0,
            days: [
                {
                    spots: [
                        { id: 1, name: "台北 101", time: "18:00", duration: "90", img: "https://images.unsplash.com/photo-1552912019-ad300259943b?w=800", lat: 25.0336, lng: 121.5646 },
                        { id: 2, name: "中正紀念堂", time: "14:00", duration: "60", img: "https://images.unsplash.com/photo-1549487353-29471329c3ae?w=800", lat: 25.0346, lng: 121.5218 }
                    ]
                }
            ],
            config: {
                ghToken: "",
                ghRepo: "",
                ghPath: "travel-data.json"
            }
        };

        let map;
        let markersLayer;
        let polyline;

        window.onload = () => {
            initMap();
            window.loadLocal();
            window.render();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            }
        };

        // 天數切換
        window.records.activeDay = 0;

        function initMap() {
            try {
                if (map) return;
                const mapContainer = document.getElementById('map');
                if (!mapContainer || mapContainer.offsetHeight === 0) {
                    setTimeout(initMap, 100);
                    return;
                }

                map = L.map('map', { 
                    zoomControl: false,
                    attributionControl: false,
                    scrollWheelZoom: true
                }).setView([35.6895, 139.6917], 13);
                
                L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&hl=zh-TW&x={x}&y={y}&z={z}', {
                    maxZoom: 20,
                    subdomains: '0123',
                    attribution: '© Google Maps'
                }).addTo(map);
                
                markersLayer = L.layerGroup().addTo(map);
                
                setTimeout(() => {
                    map.invalidateSize();
                }, 200);
            } catch (e) {
                console.error("Map initialization failed", e);
            }
        }

        window.toggleMap = function() {
            const mapSection = document.getElementById('map-section');
            const itinerarySection = document.getElementById('itinerary-section');
            if (!mapSection || !itinerarySection) return;

            const isHidden = mapSection.classList.contains('hidden');
            
            if (isHidden) {
                mapSection.classList.remove('hidden');
                itinerarySection.classList.add('lg:w-[500px]');
            } else {
                mapSection.classList.add('hidden');
                itinerarySection.classList.remove('lg:w-[500px]');
            }

            setTimeout(() => {
                if (!map) initMap();
                if (map) {
                    map.invalidateSize();
                    updateMap();
                }
            }, 300);
        }

        window.addEventListener('resize', () => {
            if (map) map.invalidateSize();
        });

        window.mapView = {
            zoomIn: () => map && map.zoomIn(),
            zoomOut: () => map && map.zoomOut()
        };

        window.render = function() {
            const records = window.records;
            const titleEl = document.getElementById('app-title');
            if (titleEl) titleEl.innerText = records.title || "我的旅程";
            
            if (records.activeDay >= records.days.length) records.activeDay = 0;

            const tabs = document.getElementById('day-tabs');
            if (!tabs) return;

            tabs.innerHTML = '';
            records.days.forEach((day, i) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-200 ${records.activeDay === i ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-white hover:bg-slate-100 text-slate-600 border border-slate-200'}`;
                btn.innerText = `第 ${i + 1} 天`;
                btn.onclick = () => { records.activeDay = i; window.render(); };
                tabs.appendChild(btn);
            });

            const list = document.getElementById('itinerary-list');
            if (!list) return;

            list.innerHTML = `<h2 class="text-2xl font-bold mb-6">第 ${records.activeDay + 1} 天 行程</h2><div id="drag-container" class="space-y-4"></div>`;
            const dragContainer = document.getElementById('drag-container');
            
            const currentDay = records.days[records.activeDay];
            const currentSpots = currentDay ? currentDay.spots : [];
            
            if (currentSpots.length === 0) {
                dragContainer.innerHTML = `
                    <div class="text-center py-20 text-slate-400">
                        <i class="ph ph-package text-5xl mb-2"></i>
                        <p>今天還沒有景點，按下方按鈕新增！</p>
                    </div>`;
            }

            currentSpots.forEach((spot, idx) => {
                const card = document.createElement('div');
                card.className = "flex gap-6 relative group spot-card";
                card.dataset.id = spot.id;
                card.innerHTML = `
                    <div class="flex flex-col items-center cursor-grab active:cursor-grabbing drag-handle">
                        <div class="w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold relative z-10 shadow-sm">${idx + 1}</div>
                        ${idx < currentSpots.length - 1 ? '<div class="w-0.5 h-full bg-slate-200 mt-2"></div>' : ''}
                    </div>
                    <div class="flex-grow bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition mb-4">
                        <div class="flex flex-col sm:flex-row min-h-[120px]">
                            <div class="sm:w-32 h-32 sm:h-auto relative shrink-0">
                                <img src="${spot.img}" class="w-full h-full object-cover">
                                <input type="file" class="hidden" id="file-${spot.id}" onchange="handleImage(${spot.id}, event)">
                                <button onclick="document.getElementById('file-${spot.id}').click()" class="absolute inset-0 bg-black/40 text-white opacity-0 group-hover:opacity-100 flex items-center justify-center text-xs transition">
                                    <i class="ph ph-camera text-xl"></i>
                                </button>
                            </div>
                            <div class="p-4 flex-grow">
                                <div class="flex justify-between items-start mb-2 gap-2">
                                    <input onchange="updateSpotField(${spot.id}, 'name', this.value)" class="text-lg font-bold outline-none block w-full focus:bg-slate-50 p-1 rounded transition border-b border-transparent focus:border-blue-200" value="${spot.name}">
                                    <button onclick="removeSpot(${spot.id})" class="text-slate-300 hover:text-rose-500 transition shrink-0 p-1">
                                        <i class="ph ph-trash text-xl"></i>
                                    </button>
                                </div>
                                <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-xs text-slate-500">
                                    <div class="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded">
                                        <i class="ph ph-clock"></i> 
                                        <input onchange="updateSpotField(${spot.id}, 'time', this.value)" type="time" value="${spot.time}" class="outline-none bg-transparent">
                                    </div>
                                    <div class="flex items-center gap-1 bg-slate-50 px-2 py-1 rounded">
                                        <i class="ph ph-hourglass"></i> 
                                        停留 <input onchange="updateSpotField(${spot.id}, 'duration', this.value)" type="number" value="${spot.duration}" class="w-10 outline-none bg-transparent text-center"> 分
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                dragContainer.appendChild(card);
            });

            if (currentSpots.length > 0) {
                new Sortable(dragContainer, {
                    handle: '.drag-handle',
                    animation: 150,
                    onEnd: (evt) => {
                        const daySpots = window.records.days[window.records.activeDay].spots;
                        const [movedItem] = daySpots.splice(evt.oldIndex, 1);
                        daySpots.splice(evt.newIndex, 0, movedItem);
                        window.render();
                    }
                });
            }

            updateMap();
            saveLocal();
        }

        window.fetchPlaceInfo = async function(name) {
            const result = { lat: null, lng: null, img: null };
            try {
                const geoUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name)}&limit=3&accept-language=zh-TW&addressdetails=1`;
                const geoRes = await fetch(geoUrl, {
                    headers: { 'User-Agent': 'TrippieApp/1.0' }
                });
                const geoData = await geoRes.json();
                
                if (geoData && geoData.length > 0) {
                    const bestMatch = geoData.find(d => d.type === 'tourism' || d.type === 'attraction' || d.type === 'monument' || d.class === 'tourism') || geoData[0];
                    result.lat = parseFloat(bestMatch.lat);
                    result.lng = parseFloat(bestMatch.lon);
                }

                const sig = Math.floor(Math.random() * 10000);
                result.img = `https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=800&q=80`;
                if (name && name.length > 0) {
                    result.img = `https://loremflickr.com/800/600/${encodeURIComponent(name)},landmark,travel?lock=${sig}`;
                }
            } catch (e) {
                console.error("Place lookup failed", e);
            }
            return result;
        }

        function updateMap() {
            if (!map || !markersLayer) return;
            markersLayer.clearLayers();
            if (polyline) map.removeLayer(polyline);

            const currentDay = window.records.days[window.records.activeDay];
            const currentSpots = currentDay ? currentDay.spots : [];
            const latlngs = [];
            
            currentSpots.forEach((spot, idx) => {
                if (spot.lat && spot.lng) {
                    const icon = L.divIcon({
                        className: 'custom-marker',
                        html: `<div>${idx + 1}</div>`,
                        iconSize: [28, 28],
                        iconAnchor: [14, 14]
                    });
                    
                    const marker = L.marker([spot.lat, spot.lng], { icon })
                        .addTo(markersLayer)
                        .bindPopup(`<div class="font-bold p-1">${idx + 1}. ${spot.name}</div>`);
                    
                    latlngs.push([spot.lat, spot.lng]);
                    
                    marker.on('click', () => {
                        const spotEls = document.querySelectorAll('.spot-card');
                        const spotEl = spotEls[idx];
                        if (spotEl) {
                            spotEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            spotEl.classList.add('ring-4', 'ring-blue-400', 'ring-offset-2');
                            setTimeout(() => spotEl.classList.remove('ring-4', 'ring-blue-400', 'ring-offset-2'), 2000);
                        }
                    });
                }
            });

            if (latlngs.length > 1) {
                polyline = L.polyline(latlngs, { 
                    color: '#f97316', 
                    weight: 3, 
                    opacity: 0.6, 
                    dashArray: '8, 8' 
                }).addTo(map);
                map.fitBounds(polyline.getBounds(), { padding: [80, 80] });
            } else if (latlngs.length === 1) {
                map.setView(latlngs[0], 15);
            }
        }

        window.showModal = function({ title, desc, showInput = false, onConfirm }) {
            const container = document.getElementById('modal-container');
            const content = document.getElementById('modal-content');
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-desc');
            const inputArea = document.getElementById('modal-input-area');
            const input = document.getElementById('modal-input');
            const confirmBtn = document.getElementById('modal-confirm');
            const cancelBtn = document.getElementById('modal-cancel');

            titleEl.innerText = title;
            descEl.innerText = desc;
            input.value = "";
            
            if (showInput) inputArea.classList.remove('hidden');
            else inputArea.classList.add('hidden');

            container.classList.remove('hidden');
            setTimeout(() => {
                container.classList.remove('opacity-0');
                content.classList.remove('scale-90');
            }, 10);

            const close = () => {
                container.classList.add('opacity-0');
                content.classList.add('scale-90');
                setTimeout(() => container.classList.add('hidden'), 200);
            };

            confirmBtn.onclick = () => {
                const val = showInput ? input.value : true;
                if (showInput && !val) return;
                if (onConfirm) onConfirm(val);
                close();
            };

            cancelBtn.onclick = close;
        }

        window.addDay = function() {
            window.records.days.push({ spots: [] });
            window.records.activeDay = window.records.days.length - 1;
            window.render();
        }

        window.removeDay = function() {
            const records = window.records;
            if (records.days.length <= 1) {
                window.showModal({ title: "提示", desc: "您至少需要保留一天的行程！", onConfirm: () => {} });
                return;
            }
            window.showModal({
                title: "刪除確認",
                desc: `確定要刪除第 ${records.activeDay + 1} 天的所有行程嗎？此操作無法還原。`,
                onConfirm: () => {
                    records.days.splice(records.activeDay, 1);
                    records.activeDay = Math.max(0, records.activeDay - 1);
                    window.render();
                }
            });
        }

        window.addSpot = function() {
            window.showModal({
                title: "新增景點",
                desc: "請輸入景點或是行程的目的地名稱：",
                showInput: true,
                onConfirm: async (name) => {
                    const id = Date.now();
                    const records = window.records;
                    const currentDay = records.days[records.activeDay];
                    if (!currentDay) return;

                    const toast = document.createElement('div');
                    toast.className = "fixed top-20 right-4 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl z-[200] animate-pulse flex items-center gap-3";
                    toast.innerHTML = `<i class="ph-bold ph-magnifying-glass"></i> 正在精確定位地圖...`;
                    document.body.appendChild(toast);

                    const info = await window.fetchPlaceInfo(name);
                    toast.remove();

                    const currentSpots = currentDay.spots;
                    const lastSpot = currentSpots.slice(-1)[0];
                    let baseLat = lastSpot ? lastSpot.lat : 35.6895; 
                    let baseLng = lastSpot ? lastSpot.lng : 139.6917;

                    const targetLat = info.lat || (baseLat + (Math.random() - 0.5) * 0.05);
                    const targetLng = info.lng || (baseLng + (Math.random() - 0.5) * 0.05);

                    currentDay.spots.push({
                        id,
                        name: name,
                        time: "10:00",
                        duration: "60",
                        img: info.img,
                        lat: targetLat,
                        lng: targetLng
                    });
                    
                    window.render();
                    if (map && info.lat) {
                        map.flyTo([targetLat, targetLng], 15);
                    }
                }
            });
        }

        window.removeSpot = function(id) {
            window.records.days[window.records.activeDay].spots = window.records.days[window.records.activeDay].spots.filter(s => s.id !== id);
            window.render();
        }

        window.updateSpotField = async function(id, field, value) {
            const currentDay = window.records.days[window.records.activeDay];
            const spot = currentDay.spots.find(s => s.id === id);
            if (spot) {
                spot[field] = value;
                
                if (field === 'name' && value.trim()) {
                    const info = await window.fetchPlaceInfo(value);
                    if (info.lat && info.lng) {
                        spot.lat = info.lat;
                        spot.lng = info.lng;
                        if (info.img) spot.img = info.img;
                    }
                }
                window.render();
            }
        }

        window.handleImage = function(id, event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                updateSpotField(id, 'img', e.target.result);
                window.render();
            };
            reader.readAsDataURL(file);
        }

        window.exportToExcel = function() {
            try {
                const records = window.records;
                const data = [];
                records.days.forEach((day, dIdx) => {
                    day.spots.forEach((spot, sIdx) => {
                        data.push({
                            "天數": `第 ${dIdx + 1} 天`,
                            "順序": sIdx + 1,
                            "景點名稱": spot.name,
                            "預計時間": spot.time,
                            "停留(分)": spot.duration,
                            "地圖經度": spot.lng,
                            "地圖緯度": spot.lat
                        });
                    });
                });
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "旅遊行程");
                XLSX.writeFile(wb, `${records.title || '行程'}_行程表.xlsx`);
            } catch (err) {
                console.error(err);
                alert("Excel 導出失敗");
            }
        }

        window.exportToWord = function() {
            const records = window.records;
            let content = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>${records.title}</title>
                <style>
                    body { font-family: 'Arial', sans-serif; line-height: 1.6; }
                    .day-header { color: #2563eb; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; margin-top: 20px; font-size: 20pt; font-weight: bold; }
                    .spot-item { margin-bottom: 15px; border-left: 4px solid #f97316; padding-left: 15px; }
                    .time { font-weight: bold; color: #64748b; font-size: 12pt; }
                    .spot-name { font-size: 16pt; font-weight: bold; color: #000000; }
                    .duration { color: #94a3b8; font-size: 10pt; }
                </style>
                </head>
                <body>
                    <h1 style="text-align:center">${records.title}</h1>
                    <p style="text-align:right">生成日期: ${new Date().toLocaleDateString()}</p>
            `;

            records.days.forEach((day, dIdx) => {
                content += `<h2 class="day-header">第 ${dIdx + 1} 天 行程</h2>`;
                if (day.spots.length === 0) {
                    content += `<p>本日無行程</p>`;
                }
                day.spots.forEach(spot => {
                    content += `
                        <div class="spot-item">
                            <div class="time">時間：${spot.time}</div>
                            <div class="spot-name">${spot.name}</div>
                            <div class="duration">預計停留: ${spot.duration} 分鐘</div>
                        </div>
                    `;
                });
            });
            content += "</body></html>";
            
            // 【修復重點】：改用 text/html 類型確保 Word 開啟時自動執行 HTML 渲染轉譯
            const blob = new Blob(['\ufeff', content], { type: 'text/html;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${records.title || '行程'}_行程稿.doc`;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.saveLocal = function() {
            const titleEl = document.getElementById('app-title');
            if (titleEl) window.records.title = titleEl.innerText;
            localStorage.setItem('trippie_records', JSON.stringify(window.records));
        }

        window.loadLocal = function() {
            const saved = localStorage.getItem('trippie_records');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    window.records = { ...window.records, ...parsed };
                    if (!window.records.config) window.records.config = { ghToken: "", ghRepo: "", ghPath: "travel-data.json" };
                    
                    document.getElementById('gh-token').value = window.records.config.ghToken || "";
                    document.getElementById('gh-repo').value = window.records.config.ghRepo || "";
                    document.getElementById('gh-path').value = window.records.config.ghPath || "travel-data.json";
                } catch (e) {
                    console.error("Failed to load local data", e);
                }
            }
        }

        window.toggleCloudSettings = function() {
            const sidebar = document.getElementById('cloud-sidebar');
            if (sidebar) sidebar.classList.toggle('translate-x-full');
        }

        window.saveConfig = function() {
            window.records.config = {
                ghToken: document.getElementById('gh-token').value,
                ghRepo: document.getElementById('gh-repo').value,
                ghPath: document.getElementById('gh-path').value
            };
            window.saveLocal();
            window.showModal({ title: "完成", desc: "您的雲端同步設定已儲存！", onConfirm: () => {} });
            window.toggleCloudSettings();
        }

        window.syncData = async function() {
            const { ghToken, ghRepo, ghPath } = window.records.config;
            if (!ghToken || !ghRepo) {
                window.showModal({ title: "需要設定", desc: "請先在側邊欄設定中輸入您的 GitHub Token 與 專案名稱！", onConfirm: () => window.toggleCloudSettings() });
                return;
            }

            try {
                const url = `https://api.github.com/repos/${ghRepo}/contents/${ghPath}`;
                const getRes = await fetch(url, {
                    headers: { 'Authorization': `token ${ghToken}` }
                });

                let sha = null;
                if (getRes.ok) {
                    const data = await getRes.json();
                    sha = data.sha;
                    
                    window.showModal({
                        title: "備份偵測",
                        desc: "偵測到雲端已有行程，要下載並「覆蓋目前行程」嗎？",
                        onConfirm: (confirm) => {
                            if (confirm) {
                                try {
                                    const content = decodeURIComponent(escape(atob(data.content)));
                                    window.records = JSON.parse(content);
                                    window.render();
                                    alert("雲端數據加載完成！");
                                } catch (e) {
                                    alert("數據解碼失敗");
                                }
                            } else {
                                window.uploadData(url, sha);
                            }
                        }
                    });
                } else {
                    window.uploadData(url, null);
                }

            } catch (err) {
                console.error(err);
                alert("同步失敗，請檢查網路或密鑰權限。");
            }
        }

        window.uploadData = async function(url, sha) {
            const { ghToken } = window.records.config;
            const contentText = JSON.stringify(window.records, null, 2);
            const base64 = btoa(unescape(encodeURIComponent(contentText)));
            
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${ghToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "Sync travel data from Trippie Web App",
                    content: base64,
                    sha: sha
                })
            });

            if (putRes.ok) alert("進度已成功同步至 GitHub！");
            else alert("上傳失敗，請稍後再試。");
        }
    </script>
</body>
</html>
