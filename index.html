<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trippie - 旅遊行程規劃器</title>
    <link rel="manifest" href="./manifest.json">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <!-- Excel Library -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- Mammoth (用於解析 Word DOCX) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar { scrollbar-width: thin; scrollbar-color: #e5e7eb transparent; }
        .spot-card:hover .delete-btn { opacity: 1; }
        #map { z-index: 1; height: 100%; width: 100%; background: #f8fafc; }
        #map-section { position: relative; transition: all 0.3s ease; }
        
        @media (max-width: 1024px) {
            main { flex-direction: column; }
            #map-section { height: 40vh; min-height: 250px; width: 100% !important; flex-shrink: 0; }
            #itinerary-section { width: 100% !important; flex-grow: 1; border-l: 0; border-t: 1px solid #e2e8f0; }
        }

        .custom-marker {
            background-color: #f97316;
            color: white;
            border-radius: 50%;
            text-align: center;
            font-weight: bold;
            line-height: 24px;
            border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden h-screen flex flex-col">

    <!-- 導覽列 -->
    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shrink-0 shadow-sm z-50">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-map-trifold text-blue-600 text-3xl"></i>
            <h1 id="app-title" contenteditable="true" class="text-xl font-bold tracking-tight outline-none focus:text-blue-600">我的旅程</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleMap()" class="p-2 hover:bg-slate-100 rounded-xl transition text-slate-600 flex items-center gap-2 border border-slate-200">
                <i class="ph ph-map-trifold text-xl"></i>
                <span class="hidden md:inline font-bold text-sm">地圖開關</span>
            </button>
            
            <button onclick="triggerImport()" class="flex items-center gap-2 bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold hover:bg-blue-100 transition border border-blue-200">
                <i class="ph ph-magic-wand"></i>
                <span class="hidden sm:inline">AI 萬能匯入</span>
            </button>
            <input type="file" id="universal-import" class="hidden" accept=".xlsx, .xls, .csv, .txt, .json, .doc, .docx, .pdf, image/*">
            
            <div class="relative group">
                <button class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold hover:bg-slate-900 transition flex items-center gap-2 shadow-lg">
                    <i class="ph ph-export"></i>
                    <span class="hidden sm:inline">匯出行程</span>
                    <i class="ph ph-caret-down"></i>
                </button>
                <div class="absolute right-0 top-full mt-2 w-48 bg-white shadow-2xl rounded-2xl border border-slate-100 py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[100] transform origin-top-right group-hover:translate-y-1">
                    <button onclick="exportToExcel()" class="w-full text-left px-4 py-3 hover:bg-green-50 flex items-center gap-3 transition">
                        <i class="ph ph-file-xls text-green-500 text-xl"></i>
                        <div class="font-bold text-sm">匯出 Excel</div>
                    </button>
                    <button onclick="exportToWord()" class="w-full text-left px-4 py-3 hover:bg-blue-50 flex items-center gap-3 transition border-t border-slate-50">
                        <i class="ph ph-file-doc text-blue-500 text-xl"></i>
                        <div class="font-bold text-sm">匯出 Word</div>
                    </button>
                </div>
            </div>

            <button onclick="toggleCloudSettings()" class="p-2 hover:bg-slate-100 rounded-full transition ml-2">
                <i class="ph ph-cloud-arrow-up text-xl text-slate-400"></i>
            </button>
            <button onclick="syncData()" class="p-2 hover:bg-blue-50 text-blue-600 rounded-full transition">
                <i class="ph ph-arrows-clockwise text-xl"></i>
            </button>
        </div>
    </nav>

    <!-- 雲端設定區 -->
    <div id="cloud-sidebar" class="fixed right-0 top-0 h-full w-80 bg-white shadow-2xl z-[60] transform translate-x-full transition-transform duration-300 p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold">GitHub 雲端同步設定</h2>
            <button onclick="toggleCloudSettings()"><i class="ph ph-x text-2xl"></i></button>
        </div>
        <div class="space-y-4">
            <input id="gh-token" type="password" class="w-full border p-2 rounded-lg" placeholder="GitHub Token (ghp_xxxx)">
            <input id="gh-repo" type="text" class="w-full border p-2 rounded-lg" placeholder="帳號/專案名 (user/repo)">
            <input id="gh-path" type="text" class="w-full border p-2 rounded-lg" value="travel-data.json">
            <button onclick="saveConfig()" class="w-full bg-slate-800 text-white py-2 rounded-lg hover:bg-slate-900 transition">儲存設定</button>
        </div>
    </div>

    <!-- 主顯示區 -->
    <main class="flex-grow flex overflow-hidden">
        <div id="map-section" class="flex-grow relative h-full border-r border-slate-200">
            <div id="map"></div>
            <div class="absolute bottom-6 left-6 z-40 bg-white p-2 rounded-xl shadow-lg border border-slate-200 flex flex-col gap-2">
                <button onclick="mapView.zoomIn()" class="p-2 hover:bg-slate-100 rounded-lg"><i class="ph ph-plus"></i></button>
                <button onclick="mapView.zoomOut()" class="p-2 hover:bg-slate-100 rounded-lg"><i class="ph ph-minus"></i></button>
                <button onclick="updateMap()" class="p-2 hover:bg-slate-100 rounded-lg border-t border-slate-100"><i class="ph ph-arrows-out"></i></button>
            </div>
        </div>

        <div id="itinerary-section" class="w-full lg:w-[500px] border-l border-slate-200 bg-white flex flex-col shrink-0 h-full">
            <div class="border-b border-slate-100 px-4 py-2 flex items-center justify-between bg-slate-50 shrink-0">
                <div class="flex gap-2 overflow-x-auto no-scrollbar" id="day-tabs"></div>
                <div class="flex gap-1 ml-2">
                    <button onclick="addDay()" class="p-1.5 bg-blue-100 text-blue-600 rounded-md hover:bg-blue-200"><i class="ph ph-plus-circle"></i></button>
                    <button onclick="removeDay()" class="p-1.5 bg-rose-100 text-rose-600 rounded-md hover:bg-rose-200 text-xs"><i class="ph ph-trash"></i></button>
                </div>
            </div>
            <div id="itinerary-list" class="flex-grow overflow-y-auto p-6 sidebar space-y-8"></div>
            <div class="p-4 border-t border-slate-100 bg-white shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                <button onclick="addSpot()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition flex items-center justify-center gap-2">
                    <i class="ph ph-plus-bold"></i>
                    <span>新增景點行程</span>
                </button>
            </div>
        </div>
    </main>

    <!-- 自定義對話框 -->
    <div id="modal-container" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-white rounded-2xl p-6 w-80 shadow-2xl transform scale-90 transition-transform duration-200" id="modal-content">
            <h3 id="modal-title" class="text-lg font-bold mb-2">確認視窗</h3>
            <p id="modal-desc" class="text-slate-500 mb-6 text-sm"></p>
            <div id="modal-input-area" class="hidden mb-4">
                <input id="modal-input" type="text" class="w-full border p-2 rounded-lg outline-none focus:border-blue-500" placeholder="請輸入內容...">
            </div>
            <div class="flex gap-2 justify-end">
                <button id="modal-cancel" class="px-4 py-2 text-slate-400 font-bold">取消</button>
                <button id="modal-confirm" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold">確定</button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const GEN_AI_KEY = ""; 
        window.records = {
            title: "我的旅程",
            activeDay: 0,
            days: [ { spots: [] } ],
            config: { ghToken: "", ghRepo: "", ghPath: "travel-data.json" }
        };

        let map, markersLayer, polyline;

        window.onload = () => {
            initMap();
            window.loadLocal();
            window.render();
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(console.error);
            }
        };

        document.getElementById('universal-import').addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                window.handleUniversalImport(e.target.files[0]);
                e.target.value = '';
            }
        });

        window.triggerImport = () => document.getElementById('universal-import').click();

        /**
         * 智慧匯入核心 (防禦性編碼 + 多天數自動分組)
         */
        window.handleUniversalImport = async function(file) {
            if (!file) return;

            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-black/60 backdrop-blur-md z-[200] flex flex-col items-center justify-center p-6";
            overlay.innerHTML = `
                <div class="bg-white rounded-[40px] px-10 py-12 flex flex-col items-center gap-8 text-center shadow-2xl">
                    <div class="w-24 h-24 rounded-full border-4 border-blue-50 border-t-blue-600 animate-spin flex items-center justify-center">
                        <i class="ph-bold ph-sparkle text-4xl text-blue-600"></i>
                    </div>
                    <div>
                        <div class="text-2xl font-black text-slate-900 mb-2">AI 行程空間解析中</div>
                        <div id="ai-status" class="text-slate-500 font-medium small">正在讀取「${file.name}」...</div>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="ai-progress" class="bg-blue-600 h-full w-0 transition-all duration-700"></div>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const status = document.getElementById('ai-status');
            const progress = document.getElementById('ai-progress');

            try {
                progress.style.width = '15%';
                let apiKey = localStorage.getItem('chicTrip_api_key') || GEN_AI_KEY;
                if (!apiKey || apiKey === "[[GEMINI_API_KEY]]" || apiKey.trim() === "") {
                    apiKey = prompt('請輸入您的 Gemini API Key：');
                    if (!apiKey) { overlay.remove(); return; }
                    localStorage.setItem('chicTrip_api_key', apiKey.trim());
                }

                const ext = file.name.split('.').pop().toLowerCase();
                let parsedData = [];

                if (ext === 'xlsx' || ext === 'xls') {
                    status.innerText = "正在解析 Excel 結構與天數...";
                    const data = await file.arrayBuffer();
                    const wb = window.XLSX.read(data);
                    const rows = window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    const dayMap = {};
                    rows.forEach(r => {
                        const spotName = r['景點名稱'] || r['景點'] || r['Spot'];
                        if(!spotName) return;
                        const dN = parseInt((r['天數']||'1').toString().match(/\d+/)?.[0] || '1');
                        if (!dayMap[dN]) dayMap[dN] = { day: dN, spots: [] };
                        dayMap[dN].spots.push({ 
                            name: spotName, 
                            time: r['預計時間']||"10:00", 
                            duration: r['停留(分)']||"60", 
                            lat: r['緯度'] || null, 
                            lng: r['經度'] || null 
                        });
                    });
                    parsedData = Object.values(dayMap).sort((a,b) => a.day - b.day);
                    progress.style.width = '50%';
                } else {
                    let inlineData = null, textData = null;
                    if (file.type.startsWith('image/') || ext === 'pdf') {
                        const base64 = await toBase64(file);
                        inlineData = { mimeType: file.type || 'application/pdf', data: base64.split(',')[1] };
                    } else if (ext === 'docx') {
                        const res = await mammoth.extractRawText({arrayBuffer: await file.arrayBuffer()});
                        textData = res.value;
                    } else { textData = await file.text(); }

                    progress.style.width = '40%';
                    status.innerText = "Gemini AI 正在解析空間定位與分組...";

                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                    const payload = { 
                        contents: [{ parts: [
                            { text: `你是專業旅遊行程解析引擎。請將內容格式化為 JSON。規則：1. 必須按天數分組(day欄位)。2. 務必利用你的知識庫為每個點提供lat與lng座標。3. 僅輸出 JSON 陣列。格式：[{"day":1, "spots":[{"name":"..","time":"..","lat":0.0,"lng":0.0}]}]` },
                            inlineData ? { inlineData: inlineData } : { text: textData }
                        ]}],
                        generationConfig: { responseMimeType: "application/json" }
                    };

                    for (let retry = 0; retry < 3; retry++) {
                        try {
                            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                            if (!res.ok) throw new Error(`HTTP ${res.status}`);
                            const d = await res.json();
                            
                            // --- 修復 'reading 0' 之防禦邏輯 ---
                            if (!d.candidates || d.candidates.length === 0) {
                                throw new Error("AI 拒絕產出內容 (可能觸發安全過濾或模型過載)。");
                            }
                            
                            parsedData = JSON.parse(d.candidates[0].content.parts[0].text);
                            break;
                        } catch (e) { 
                            if (retry === 2) throw e; 
                            await new Promise(ok => setTimeout(ok, 2000)); 
                        }
                    }
                }

                progress.style.width = '75%';
                status.innerText = "正在自動配置分頁與圖片...";

                let totalCount = 0;
                const baseDayIdx = window.records.activeDay;

                for (let i = 0; i < parsedData.length; i++) {
                    const targetIdx = baseDayIdx + i;
                    // 自動增加天數分頁
                    while (window.records.days.length <= targetIdx) window.records.days.push({ spots: [] });

                    const spots = Array.isArray(parsedData[i].spots) ? parsedData[i].spots : (Array.isArray(parsedData[i]) ? parsedData[i] : []);
                    const processed = await Promise.all(spots.map(async (s) => {
                        let lat = parseFloat(s.lat), lng = parseFloat(s.lng);
                        if (isNaN(lat) || !lat) {
                            const info = await window.fetchPlaceInfo(s.name);
                            lat = info.lat; lng = info.lng;
                        }
                        totalCount++;
                        return { 
                            id: Date.now() + Math.random(), 
                            name: s.name || "未命名景點", 
                            time: s.time || "10:00", 
                            duration: s.duration || "60", 
                            img: `https://loremflickr.com/400/300/${encodeURIComponent((s.name||"").split(' ')[0])},landmark?lock=${Math.floor(Math.random()*1000)}`, 
                            lat, lng 
                        };
                    }));
                    window.records.days[targetIdx].spots.push(...processed);
                }

                progress.style.width = '100%';
                setTimeout(() => {
                    overlay.remove();
                    window.render();
                    window.showModal({ 
                        title: "匯入成功", 
                        desc: `已成功載入 ${parsedData.length} 天的行程，共 ${totalCount} 個景點。<br>地圖已針對重疊景點進行自動展開補償。`, 
                        onConfirm: ()=>{} 
                    });
                }, 400);

            } catch (err) {
                overlay.remove();
                console.error(err);
                window.showModal({ 
                    title: "解析中斷", 
                    desc: `錯誤詳情：${err.message}<br><br>請確認金鑰是否正確，或嘗試換一個檔案格式。`, 
                    onConfirm: ()=>{} 
                });
            }
        };

        function toBase64(file) { return new Promise((resolve, reject) => { const reader = new FileReader(); reader.readAsDataURL(file); reader.onload = () => resolve(reader.result); reader.onerror = error => reject(error); }); }

        window.initMap = function() {
            if (map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([35.6895, 139.6917], 13);
            L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&hl=zh-TW&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains: '0123' }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            setTimeout(() => map.invalidateSize(), 200);
        };

        window.render = function() {
            const r = window.records;
            const tabs = document.getElementById('day-tabs');
            tabs.innerHTML = '';
            r.days.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-1.5 rounded-full text-sm font-bold whitespace-nowrap transition-all ${r.activeDay === i ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-slate-600 border border-slate-200'}`;
                btn.innerText = `第 ${i+1} 天`;
                btn.onclick = () => { r.activeDay = i; window.render(); };
                tabs.appendChild(btn);
            });

            const list = document.getElementById('itinerary-list');
            list.innerHTML = `<h2 class="text-2xl font-bold mb-6">第 ${r.activeDay+1} 天 行程</h2><div id="drag-container" class="space-y-4"></div>`;
            const dragContainer = document.getElementById('drag-container');
            const currentSpots = r.days[r.activeDay].spots;

            if (currentSpots.length === 0) {
                dragContainer.innerHTML = `<div class="text-center py-20 text-slate-400">目前尚無行程景點。</div>`;
            }

            currentSpots.forEach((spot, idx) => {
                const card = document.createElement('div');
                card.className = "flex gap-6 spot-card items-start";
                card.innerHTML = `
                    <div class="flex flex-col items-center shrink-0">
                        <div class="w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold shadow-sm">${idx + 1}</div>
                        ${idx < currentSpots.length - 1 ? '<div class="w-0.5 h-16 bg-slate-200 mt-2"></div>' : ''}
                    </div>
                    <div class="flex-grow bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm p-4 flex gap-4 hover:shadow-md transition">
                        <img src="${spot.img}" class="w-20 h-20 rounded-lg object-cover bg-slate-100">
                        <div class="flex-grow">
                            <div class="flex justify-between font-bold text-slate-800">
                                <input onchange="updateSpotField(${spot.id},'name',this.value)" class="outline-none focus:text-blue-600 w-full" value="${spot.name}">
                                <button onclick="removeSpot(${spot.id})" class="text-slate-300 hover:text-rose-500 transition"><i class="ph ph-trash text-xl"></i></button>
                            </div>
                            <div class="text-xs text-slate-500 mt-2 flex items-center gap-3">
                                <span class="bg-slate-100 px-2 py-0.5 rounded">${spot.time}</span>
                                <span>停留 ${spot.duration} 分鐘</span>
                            </div>
                        </div>
                    </div>
                `;
                dragContainer.appendChild(card);
            });

            if (currentSpots.length > 0) {
                new Sortable(dragContainer, { animation: 150, onEnd: (evt) => {
                    const spots = window.records.days[window.records.activeDay].spots;
                    const [moved] = spots.splice(evt.oldIndex, 1);
                    spots.splice(evt.newIndex, 0, moved);
                    window.render();
                }});
            }
            updateMap();
            saveLocal();
        };

        /**
         * 地圖核心更新 (修復重疊：進階座標抖動補償)
         */
        function updateMap() {
            if (!map || !markersLayer) return;
            markersLayer.clearLayers();
            if (polyline) map.removeLayer(polyline);

            const spots = window.records.days[window.records.activeDay].spots;
            const latlngs = [];
            const coordsSeen = {}; 

            spots.forEach((spot, idx) => {
                if (spot.lat && spot.lng) {
                    let finalLat = parseFloat(spot.lat);
                    let finalLng = parseFloat(spot.lng);
                    const key = `${finalLat.toFixed(6)}_${finalLng.toFixed(6)}`;

                    // --- 智慧階層式抖動：解決標記消失不見的問題 ---
                    if (coordsSeen[key]) {
                        const count = coordsSeen[key]++;
                        // 使用螺旋散佈位移，確保所有點在任何縮放層級都清晰
                        const offset = 0.00035 * Math.sqrt(count); 
                        const angle = count * 137.5; // 黃金角度散佈
                        finalLat += offset * Math.sin(angle * Math.PI / 180);
                        finalLng += offset * Math.cos(angle * Math.PI / 180);
                    } else {
                        coordsSeen[key] = 1;
                    }

                    const icon = L.divIcon({
                        className: 'custom-marker',
                        html: `<div>${idx + 1}</div>`,
                        iconSize: [28, 28],
                        iconAnchor: [14, 14]
                    });
                    
                    const marker = L.marker([finalLat, finalLng], { icon }).addTo(markersLayer)
                                   .bindPopup(`<b>${idx + 1}. ${spot.name}</b>`);
                    
                    latlngs.push([finalLat, finalLng]);
                }
            });

            if (latlngs.length > 1) {
                polyline = L.polyline(latlngs, { color: '#f97316', weight: 3, opacity: 0.5, dashArray: '8, 8' }).addTo(map);
                map.fitBounds(polyline.getBounds(), { padding: [60, 60] });
            } else if (latlngs.length === 1) {
                map.setView(latlngs[0], 15);
            }
        }

        window.fetchPlaceInfo = async function(name) {
            const res = { lat: 35.6895 + (Math.random()-0.5)*0.1, lng: 139.6917 + (Math.random()-0.5)*0.1 };
            try {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name)}&limit=1`;
                const r = await fetch(url, { headers: { 'User-Agent': 'Trippie/2.0' } });
                const d = await r.json();
                if (d.length > 0) { res.lat = parseFloat(d[0].lat); res.lng = parseFloat(d[0].lon); }
            } catch(e) {}
            return res;
        };

        window.showModal = function({ title, desc, showInput = false, onConfirm }) {
            const container = document.getElementById('modal-container');
            const titleEl = document.getElementById('modal-title');
            const descEl = document.getElementById('modal-desc');
            const inputArea = document.getElementById('modal-input-area');
            const confirmBtn = document.getElementById('modal-confirm');
            titleEl.innerText = title;
            descEl.innerHTML = desc;
            inputArea.classList.toggle('hidden', !showInput);
            container.classList.remove('hidden');
            setTimeout(() => container.classList.remove('opacity-0'), 10);
            confirmBtn.onclick = () => { if(onConfirm) onConfirm(document.getElementById('modal-input').value); container.classList.add('hidden'); };
            document.getElementById('modal-cancel').onclick = () => container.classList.add('hidden');
        };

        window.addDay = () => { window.records.days.push({ spots: [] }); window.records.activeDay = window.records.days.length - 1; window.render(); };
        window.removeDay = () => { if(window.records.days.length>1) { window.records.days.splice(window.records.activeDay, 1); window.records.activeDay=0; window.render(); } };
        window.removeSpot = (id) => { window.records.days[window.records.activeDay].spots = window.records.days[window.records.activeDay].spots.filter(s=>s.id!==id); window.render(); };
        window.updateSpotField = (id, f, v) => { const s = window.records.days[window.records.activeDay].spots.find(x=>x.id===id); if(s) { s[f]=v; if(f==='name') window.render(); } };
        window.saveLocal = () => localStorage.setItem('trippie_records', JSON.stringify(window.records));
        window.loadLocal = () => { const s = localStorage.getItem('trippie_records'); if(s) window.records = JSON.parse(s); };
        window.toggleMap = () => { document.getElementById('map-section').classList.toggle('hidden'); setTimeout(()=>map.invalidateSize(), 300); };
        window.toggleCloudSettings = () => document.getElementById('cloud-sidebar').classList.toggle('translate-x-full');
        window.saveConfig = () => { window.records.config.ghToken = document.getElementById('gh-token').value; window.saveLocal(); window.toggleCloudSettings(); };
    </script>
</body>
</html>
