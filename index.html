<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放飛自我</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .dragging { opacity: 0.5; }
        .drag-over { border-top: 2px solid #3B82F6; }
        .tab-transition { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #trip-title-input::placeholder { color: rgba(255, 255, 255, 0.5); }
    </style>
</head>

<body class="bg-slate-200 flex items-center justify-center h-screen font-sans text-slate-800">

    <div class="bg-white w-full max-w-md h-full flex flex-col shadow-2xl relative overflow-hidden">

        <!-- Header: 動態標題與多功能列 -->
        <div class="p-3 bg-blue-900 text-white font-bold text-lg flex justify-between items-center shadow-md z-40">
            <div class="flex items-center gap-2 flex-1 overflow-hidden">
                <i class="fas fa-map-marked-alt text-blue-300"></i>
                <input id="trip-title-input" 
                       class="bg-transparent border-none outline-none text-white font-bold text-base w-full focus:ring-0 truncate" 
                       value="我的旅遊行程" 
                       oninput="saveTripTitle()"
                       placeholder="請輸入行程標題...">
            </div>
            
            <!-- 功能按鈕區：微調尺寸以容納多重檔案管理功能 -->
            <div class="flex items-center gap-1.5 ml-2">
                <input type="file" id="import-file" accept=".xlsx, .xls, .csv, .txt, .json, .doc, .docx, image/*" class="hidden" onchange="handleImport(event)">
                
                <!-- 1. 行程資料夾 (切換舊檔) -->
                <button onclick="openTripManager()" class="bg-amber-500 hover:bg-amber-400 text-white w-7 h-7 rounded-full shadow transition active:scale-95 flex items-center justify-center" title="我的所有行程">
                    <i class="fas fa-folder-open text-[10px]"></i>
                </button>
                
                <!-- 2. 開新行程 (保留舊檔) -->
                <button onclick="createNewTrip()" class="bg-emerald-500 hover:bg-emerald-400 text-white w-7 h-7 rounded-full shadow transition active:scale-95 flex items-center justify-center" title="開新行程 (舊檔自動保留)">
                    <i class="fas fa-file-circle-plus text-[10px]"></i>
                </button>

                <!-- 3. 刪除當前行程 -->
                <button onclick="deleteCurrentTrip()" class="bg-rose-500 hover:bg-rose-400 text-white w-7 h-7 rounded-full shadow transition active:scale-95 flex items-center justify-center" title="刪除目前行程">
                    <i class="fas fa-trash-can text-[10px]"></i>
                </button>

                <!-- 其他既有功能 -->
                <button onclick="triggerImport()" class="bg-teal-500 hover:bg-teal-400 text-white w-7 h-7 rounded-full shadow transition active:scale-95 flex items-center justify-center" title="匯入行程">
                    <i class="fas fa-file-import text-[10px]"></i>
                </button>
                <button onclick="openExportModal()" class="bg-indigo-500 hover:bg-indigo-400 text-white w-7 h-7 rounded-full shadow transition active:scale-95 flex items-center justify-center" title="匯出行程">
                    <i class="fas fa-file-export text-[10px]"></i>
                </button>
                <button onclick="addDay()" class="bg-blue-500 hover:bg-blue-400 text-white w-7 h-7 rounded-full shadow-lg transition active:scale-95 flex items-center justify-center" title="增加天數">
                    <i class="fas fa-plus text-[10px]"></i>
                </button>
            </div>
        </div>

        <div class="bg-blue-800 flex items-center relative z-30 shadow-inner group">
            <button onclick="scrollTabs('left')" class="absolute left-0 z-10 bg-blue-900/50 text-white w-6 h-full opacity-0 group-hover:opacity-100 transition">
                <i class="fas fa-chevron-left text-[10px]"></i>
            </button>
            <div id="tabs-container" class="flex-1 flex items-center overflow-x-auto no-scrollbar px-2 py-3 gap-2 scroll-smooth"></div>
            <button onclick="scrollTabs('right')" class="absolute right-0 z-10 bg-blue-900/50 text-white w-6 h-full opacity-0 group-hover:opacity-100 transition">
                <i class="fas fa-chevron-right text-[10px]"></i>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 bg-gray-50 space-y-3" id="itinerary-list"></div>

        <div class="p-4 bg-white border-t border-gray-200 shadow-md z-40">
            <div class="flex gap-2">
                <input id="new-spot-name" class="border border-gray-300 rounded-lg p-3 flex-1 focus:ring-2 focus:ring-blue-500 focus:outline-none transition text-sm" placeholder="輸入景點名稱">
                <button onclick="addCustomSpot()" class="bg-blue-700 hover:bg-blue-800 text-white px-5 rounded-lg font-bold transition active:transform active:scale-95 text-xs">新增</button>
            </div>
        </div>

        <div id="ai-loading-modal" class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center hidden z-[60]">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-teal-400 mb-6"></div>
            <h3 id="loading-title" class="text-lg font-bold text-white mb-2 animate-pulse">解析中...</h3>
            <p id="loading-desc" class="text-teal-200 text-xs text-center px-6">正在分析內容</p>
        </div>
    </div>

    <!-- 彈窗：自訂 Modal -->
    <div id="custom-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden z-[70] p-6">
        <div class="bg-white rounded-xl p-6 w-full max-w-xs shadow-2xl scale-95 transition-transform">
            <h3 id="modal-title" class="text-lg font-bold text-slate-800 mb-2">提示</h3>
            <p id="modal-message" class="text-slate-500 mb-6 text-sm leading-relaxed"></p>
            <div class="flex justify-end gap-3" id="modal-actions"></div>
        </div>
    </div>

    <!-- 【新增】彈窗：行程檔案管理器 (Trip Manager) -->
    <div id="trip-manager-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden z-[70] p-4">
        <div class="bg-white rounded-xl p-5 w-full max-w-sm shadow-2xl flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4 border-b pb-3">
                <h3 class="text-lg font-bold text-slate-800"><i class="fas fa-folder-open text-amber-500 mr-2"></i>我的行程檔案庫</h3>
                <button onclick="closeTripManager()" class="text-slate-400 hover:text-slate-600 text-lg"><i class="fas fa-times"></i></button>
            </div>
            <div class="text-xs text-slate-500 mb-3">點擊即可切換，系統會自動在背景為您儲存。</div>
            <div id="trip-list-container" class="flex-1 overflow-y-auto space-y-2 no-scrollbar pb-2">
                <!-- 行程清單將動態渲染於此 -->
            </div>
        </div>
    </div>

    <!-- 彈窗：匯出選項 -->
    <div id="export-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden z-[70] p-6">
        <div class="bg-white rounded-xl p-6 w-full max-w-sm shadow-2xl transition-transform">
            <div class="flex items-center gap-3 mb-4">
                <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center"><i class="fas fa-file-export text-lg"></i></div>
                <h3 class="text-lg font-bold text-slate-800">匯出行程表</h3>
            </div>
            <div class="space-y-3 mb-6">
                <label class="flex items-center p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50">
                    <input type="radio" name="export-format" value="pdf" class="w-4 h-4 text-blue-600" checked>
                    <span class="ml-3 text-sm font-bold"><i class="fas fa-file-pdf text-red-500 mr-2"></i> PDF 文件</span>
                </label>
                <label class="flex items-center p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50">
                    <input type="radio" name="export-format" value="word" class="w-4 h-4 text-blue-600">
                    <span class="ml-3 text-sm font-bold"><i class="fas fa-file-word text-blue-600 mr-2"></i> Word (DOC)</span>
                </label>
                <label class="flex items-center p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50">
                    <input type="radio" name="export-format" value="excel" class="w-4 h-4 text-blue-600">
                    <span class="ml-3 text-sm font-bold"><i class="fas fa-file-excel text-green-600 mr-2"></i> Excel (XLSX)</span>
                </label>
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="closeExportModal()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold">取消</button>
                <button onclick="executeExport()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-xs font-bold shadow-lg">確認下載</button>
            </div>
        </div>
    </div>

    <!-- 腳本邏輯 -->
    <script>
        // --- 核心狀態管理 (升級為多檔支援) ---
        let allTrips = []; 
        let currentTripId = null;
        let tripData = []; 
        let currentDayIndex = 0;
        let draggedElement = null;

        function generateId() { return (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : 'id_' + Math.random().toString(36).substr(2, 9); }

        // --- 多重行程儲存引擎 ---
        function loadAllTrips() {
            const savedTrips = localStorage.getItem('chicTrip_all_trips');
            
            // 無縫轉移舊版單一檔案資料 (確保使用者剛才做的檔案不會不見)
            const oldData = localStorage.getItem('trip_multiday');
            const oldTitle = localStorage.getItem('trip_title') || "我的旅遊行程";

            if (savedTrips) {
                allTrips = JSON.parse(savedTrips);
            } else if (oldData) {
                const newId = generateId();
                allTrips = [{ id: newId, title: oldTitle, data: JSON.parse(oldData), updatedAt: Date.now() }];
                // 轉移後清理舊資料
                localStorage.removeItem('trip_multiday');
                localStorage.removeItem('trip_title');
            }

            // 判斷該顯示哪一份行程
            currentTripId = localStorage.getItem('chicTrip_current_id');
            
            if (!currentTripId || !allTrips.find(t => t.id === currentTripId)) {
                if (allTrips.length > 0) {
                    switchTrip(allTrips[0].id);
                } else {
                    createNewTrip(true); // 初始化建立第一份檔案
                }
            } else {
                switchTrip(currentTripId);
            }
        }

        function saveAllTrips() {
            localStorage.setItem('chicTrip_all_trips', JSON.stringify(allTrips));
            if (currentTripId) localStorage.setItem('chicTrip_current_id', currentTripId);
        }

        function saveCurrentTripState() {
            if (!currentTripId) return;
            const trip = allTrips.find(t => t.id === currentTripId);
            if (trip) {
                trip.title = document.getElementById('trip-title-input').value || "未命名行程";
                trip.data = tripData;
                trip.updatedAt = Date.now();
                saveAllTrips();
            }
        }

        // 綁定舊的儲存事件至新引擎
        function saveTripTitle() { saveCurrentTripState(); }
        function saveItinerary() { saveCurrentTripState(); }

        // --- 新增 / 刪除 / 切換 功能 ---
        function createNewTrip(isInit = false) {
            // 建立一份全新的白紙
            const newId = generateId();
            const newTrip = {
                id: newId,
                title: "新旅遊行程",
                data: [{ id: generateId(), dayNameIdentifier: '第 1 天', spots: [] }],
                updatedAt: Date.now()
            };
            
            allTrips.unshift(newTrip); // 加入清單最上方
            saveAllTrips();
            
            if (!isInit) {
                switchTrip(newId);
                showModal('開新檔案成功', '為您開啟了一張乾淨的行程表！<br><br><span class="text-amber-600 font-bold">💡 提示：您隨時可以點擊上方的「黃色資料夾」找回剛才的舊檔案。</span>', false);
            }
        }

        function deleteCurrentTrip() {
            if (allTrips.length === 0) return;
            const currentTitle = document.getElementById('trip-title-input').value;
            
            showModal('永久刪除確認', `確定要將 <b>「${currentTitle}」</b> 徹底刪除嗎？<br>此動作無法復原！`, true, () => {
                // 從陣列中過濾掉目前這份
                allTrips = allTrips.filter(t => t.id !== currentTripId);
                
                // 刪除後，自動打開上一份，或直接建立新的
                if (allTrips.length > 0) {
                    switchTrip(allTrips[0].id);
                } else {
                    createNewTrip(true);
                    switchTrip(currentTripId);
                }
                saveAllTrips();
            });
        }

        function switchTrip(id) {
            currentTripId = id;
            const trip = allTrips.find(t => t.id === id);
            if (trip) {
                document.getElementById('trip-title-input').value = trip.title;
                tripData = JSON.parse(JSON.stringify(trip.data));
                currentDayIndex = 0;
                saveAllTrips();
                renderAll();
                closeTripManager();
            }
        }

        // --- 行程資料夾 Modal 邏輯 ---
        function openTripManager() {
            saveCurrentTripState(); // 打開前強制存檔一次
            const container = document.getElementById('trip-list-container');
            container.innerHTML = '';
            
            // 依照更新時間排序 (最新的在最上面)
            const sortedTrips = [...allTrips].sort((a, b) => b.updatedAt - a.updatedAt);
            
            sortedTrips.forEach(t => {
                const isActive = t.id === currentTripId;
                const activeClass = isActive ? 'border-blue-500 bg-blue-50 shadow-md' : 'border-slate-200 hover:border-blue-300 bg-white hover:bg-slate-50';
                const dayCount = t.data.length;
                const spotCount = t.data.reduce((acc, curr) => acc + curr.spots.length, 0);
                
                // 格式化時間
                const dateObj = new Date(t.updatedAt);
                const dateStr = `${dateObj.getMonth()+1}/${dateObj.getDate()} ${dateObj.getHours().toString().padStart(2, '0')}:${dateObj.getMinutes().toString().padStart(2, '0')}`;

                container.insertAdjacentHTML('beforeend', `
                    <div onclick="switchTrip('${t.id}')" class="p-3 border-2 rounded-xl cursor-pointer transition ${activeClass} flex justify-between items-center">
                        <div class="overflow-hidden pr-2">
                            <div class="font-bold text-slate-700 text-sm truncate">${t.title}</div>
                            <div class="text-[11px] text-slate-500 mt-1 font-medium">
                                <i class="fas fa-calendar-day mr-1 text-slate-400"></i>${dayCount} 天 
                                <span class="mx-1 text-slate-300">|</span> 
                                <i class="fas fa-map-pin mr-1 text-slate-400"></i>${spotCount} 景點
                            </div>
                            <div class="text-[10px] text-slate-400 mt-1">最後修改: ${dateStr}</div>
                        </div>
                        ${isActive ? '<div class="text-xs bg-blue-600 text-white px-2 py-1 rounded font-bold shadow whitespace-nowrap">目前開啟</div>' : '<i class="fas fa-chevron-right text-slate-300"></i>'}
                    </div>
                `);
            });
            document.getElementById('trip-manager-modal').classList.remove('hidden');
        }

        function closeTripManager() {
            document.getElementById('trip-manager-modal').classList.add('hidden');
        }


        // --- 核心識別演算法 ---
        function normalizeDayName(name) {
            if (!name) return "1";
            let str = name.toString().replace(/\s+/g, '').replace(/[第天DayD【】\[\]\-\_]/gi, '');
            const chnMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
            if(chnMap[str]) return chnMap[str].toString();
            return str || "1";
        }

        function extractTimeMinutes(text) {
            if (!text) return 9999;
            const regex = /(?:(上午|下午|AM|PM)\s*)?([01]?[0-9]|2[0-3])[:：點]\s*([0-5][0-9])/i;
            const match = text.match(regex);
            if (match) {
                let am = (match[1] || '').toUpperCase();
                let h = parseInt(match[2], 10);
                let m = parseInt(match[3], 10);
                if ((am.includes('下') || am === 'PM') && h < 12) h += 12;
                if ((am.includes('上') || am === 'AM') && h === 12) h = 0;
                return h * 60 + m; 
            }
            return 9999;
        }

        // --- 核心邏輯：合併、去重、地標保護 ---
        function mergeIncomingData(incomingDays) {
            const hotelKey = /(飯店|酒店|旅店|民宿|旅館|住宿|Hotel|Stay|Inn)/i;
            const hubKey = /(站|車站|轉運站|機場|碼頭|港|航廈|月台)/;
            const transitAction = /^(交通|移動|移動過程|交通時間|步行時間|搭車時間)$|^前往|^(搭乘|搭|搭機|轉機|坐車|走路|步行)$/;

            let merged = JSON.parse(JSON.stringify(tripData));

            incomingDays.forEach(inDay => {
                const inID = normalizeDayName(inDay.dayNameIdentifier);
                let target = merged.find(d => normalizeDayName(d.dayNameIdentifier) === inID);
                
                if (!target) {
                    target = { id: generateId(), dayNameIdentifier: inDay.dayNameIdentifier || `第 ${merged.length + 1} 天`, spots: [] };
                    merged.push(target);
                }

                const daySeen = new Set();
                target.spots.forEach(s => {
                    if (!hotelKey.test(s.name)) daySeen.add(s.name.trim().toLowerCase());
                });

                (inDay.spots || []).forEach(inSpot => {
                    const name = (inSpot.name || '').trim();
                    if (!name) return;
                    if (transitAction.test(name) && !hubKey.test(name)) return;

                    const low = name.toLowerCase();
                    const isHotel = hotelKey.test(name);
                    if (!isHotel && daySeen.has(low)) return;
                    if (!isHotel) daySeen.add(low);

                    target.spots.push({ id: generateId(), name: name, desc: inSpot.desc || '' });
                });
            });

            merged.forEach(day => {
                day.spots.sort((a, b) => {
                    const tA = Math.min(extractTimeMinutes(a.name), extractTimeMinutes(a.desc));
                    const tB = Math.min(extractTimeMinutes(b.name), extractTimeMinutes(b.desc));
                    return tA - tB;
                });
            });

            tripData = merged;
            saveItinerary();
            renderAll();
        }

        // --- UI 回饋與彈窗系統 ---
        function showModal(title, message, isConfirm, onConfirm) {
            const m = document.getElementById('custom-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerHTML = message;
            const acts = document.getElementById('modal-actions');
            acts.innerHTML = '';
            if (isConfirm) {
                acts.innerHTML = `
                    <button onclick="closeModal()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-xs font-bold hover:bg-slate-200 transition">取消</button>
                    <button id="modal-confirm-btn" class="px-4 py-2 bg-red-500 text-white rounded-lg text-xs font-bold shadow-lg hover:bg-red-600 transition">確定</button>
                `;
                document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); };
            } else {
                acts.innerHTML = `<button onclick="closeModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-xs font-bold w-full hover:bg-blue-700 transition">確定</button>`;
            }
            m.classList.remove('hidden');
        }
        function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }
        function showLoading(t, d) { document.getElementById('loading-title').innerText = t; document.getElementById('loading-desc').innerText = d; document.getElementById('ai-loading-modal').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('ai-loading-modal').classList.add('hidden'); }

        // --- 萬能匯出 ---
        function openExportModal() { document.getElementById('export-modal').classList.remove('hidden'); }
        function closeExportModal() { document.getElementById('export-modal').classList.add('hidden'); }
        function executeExport() {
            const fmt = document.querySelector('input[name="export-format"]:checked').value;
            const title = document.getElementById('trip-title-input').value.trim() || "旅遊行程";
            closeExportModal();
            if (tripData.every(d => d.spots.length === 0)) return showModal('提示', '行程目前為空，沒有資料可匯出', false);

            if (fmt === 'excel') exportExcel(title);
            else if (fmt === 'pdf') exportPDF(title);
            else exportWord(title);
        }

        function exportExcel(title) {
            const rows = [];
            tripData.forEach(d => {
                d.spots.forEach((s, i) => {
                    rows.push({ '天數': d.dayNameIdentifier, '序': i+1, '景點名稱': s.name, '備註說明': s.desc });
                });
                rows.push({ '天數': '', '序': '', '景點名稱': '', '備註說明': '' });
            });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), "行程");
            XLSX.writeFile(wb, `${title}.xlsx`);
        }

        function exportPDF(title) {
            const el = document.createElement('div');
            el.style.padding = '30px';
            el.innerHTML = `<h1 style="color:#1e3a8a; text-align:center; margin-bottom: 30px;">${title}</h1>`;
            
            tripData.forEach((d, dIdx) => {
                if(d.spots.length === 0) return;
                const spacerStyle = dIdx > 0 ? 'margin-top: 50px;' : '';
                el.innerHTML += `<h2 style="background:#f1f5f9; padding:10px; border-left: 5px solid #1e3a8a; ${spacerStyle}">${d.dayNameIdentifier}</h2>`;
                d.spots.forEach((s, i) => {
                    el.innerHTML += `<p style="margin: 12px 0; border-bottom: 1px solid #eee; padding-bottom: 5px;">
                        <b style="color: #334155;">${i+1}. ${s.name}</b><br>
                        <span style="font-size: 0.85em; color: #64748b;">${s.desc}</span>
                    </p>`;
                });
            });
            html2pdf().from(el).set({
                margin: 10,
                filename: `${title}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        function exportWord(title) {
            let doc = `${title}\n\n`;
            tripData.forEach(d => {
                doc += `【${d.dayNameIdentifier}】\n`;
                d.spots.forEach((s, i) => {
                    doc += `${i+1}. ${s.name} - ${s.desc}\n`;
                });
                doc += "\n\n"; 
            });
            const b = new Blob(['\ufeff', doc], { type: 'application/msword' });
            const l = document.createElement('a'); l.href = URL.createObjectURL(b); l.download = `${title}.doc`; l.click();
        }

        // --- 智慧匯入引擎 ---
        function triggerImport() { document.getElementById('import-file').click(); }
        async function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            
            if (file.type.startsWith('image/')) {
                const r = new FileReader(); 
                r.onload = ev => callGeminiAI(ev.target.result.split(',')[1], file.type, true); 
                r.readAsDataURL(file);
            } else if (ext === 'docx') {
                showLoading('Word 解析中', '正在由 AI 精準提取...');
                const r = new FileReader(); 
                r.onload = ev => mammoth.extractRawText({arrayBuffer: ev.target.result}).then(res => callGeminiAI(res.value, 'text/plain', false)); 
                r.readAsArrayBuffer(file);
            } else if (ext === 'doc' || ext === 'txt') {
                showLoading('文件解析中', '正在由 AI 整理行程...');
                const r = new FileReader();
                r.onload = ev => callGeminiAI(ev.target.result, 'text/plain', false);
                r.readAsText(file);
            } else {
                const r = new FileReader();
                r.onload = ev => {
                    try {
                        if (ext === 'json') mergeIncomingData(JSON.parse(new TextDecoder().decode(ev.target.result)));
                        else {
                            const wb = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                            const fmt = [];
                            rows.forEach(r => {
                                const dN = r['天數'] || '第 1 天';
                                if(!r['景點名稱']) return;
                                let d = fmt.find(x => x.dayNameIdentifier === dN);
                                if(!d) { d = { dayNameIdentifier: dN, spots: [] }; fmt.push(d); }
                                d.spots.push({ name: r['景點名稱'], desc: r['備註說明'] || '' });
                            });
                            mergeIncomingData(fmt);
                        }
                        showModal('匯入成功', '資料已智慧追加並排序', false);
                    } catch(err) { showModal('錯誤', '檔案格式不支援', false); }
                };
                r.readAsArrayBuffer(file);
            }
            setTimeout(() => { e.target.value = ''; }, 500);
        }

        // --- AI 解析引擎 ---
        async function callGeminiAI(input, mime, isImg) {
            showLoading('AI 智慧引擎', '分析中...');
            const apiKey = "AIzaSyDgdR3AIWEpS7SsJwbRKHrBimdkNlCFSLU"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = "你是行程規劃專家。請從附件「逐一提取」景點、飯店、轉運站。⚠️嚴禁摘要、排除純交通動作描述。請務必以 JSON Array 格式回傳。格式：[{dayNameIdentifier: '第 1 天', spots: [{name: '景點名', desc: '備註'}]}]";
            
            const payload = { 
                contents: [{ parts: [ { text: prompt }, isImg ? { inlineData: { mimeType: mime, data: input } } : { text: input } ] }], 
                generationConfig: { 
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "ARRAY",
                        items: {
                            type: "OBJECT",
                            properties: {
                                dayNameIdentifier: { type: "STRING" },
                                spots: { type: "ARRAY", items: { type: "OBJECT", properties: { name: { type: "STRING" }, desc: { type: "STRING" } } } }
                            }
                        }
                    }
                } 
            };

            let ok = false;
            for (let i = 0; i < 5; i++) {
                try {
                    const r = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    if (!r.ok) throw new Error("API 失敗");
                    const d = await r.json();
                    let txt = d.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (txt) { 
                        txt = txt.replace(/```json/gi, '').replace(/```/g, '').trim();
                        mergeIncomingData(JSON.parse(txt)); 
                        ok = true; 
                        break; 
                    }
                } catch (e) { await new Promise(res => setTimeout(res, Math.pow(2, i) * 1000)); }
            }
            hideLoading();
            if(!ok) showModal('系統忙碌', 'AI 伺服器無回應或格式異常，請稍後再試', false);
        }

        // --- 基礎渲染控制 ---
        function renderAll() { renderTabs(); renderItinerary(); }
        
        function renderTabs() {
            const c = document.getElementById('tabs-container'); c.innerHTML = '';
            tripData.forEach((d, i) => {
                const active = i === currentDayIndex;
                const style = active ? "bg-white text-blue-900 shadow-md scale-105" : "bg-blue-700 text-blue-200 hover:bg-blue-600";
                c.insertAdjacentHTML('beforeend', `<div class="flex-shrink-0 px-5 py-2 rounded-full text-xs font-bold transition-all transform flex items-center gap-2 cursor-pointer ${style}" onclick="switchDay(${i}, this)"><span>D${i+1}</span>${tripData.length > 1 ? `<i class="fas fa-times-circle opacity-40 hover:opacity-100 text-[10px]" onclick="deleteDay(event, ${i})"></i>` : ''}</div>`);
            });
        }
        function switchDay(i, el) { currentDayIndex = i; renderAll(); if(el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }); }
        function scrollTabs(dir) { document.getElementById('tabs-container').scrollBy({ left: dir === 'left' ? -150 : 150, behavior: 'smooth' }); }
        function addDay() { tripData.push({ id: generateId(), dayNameIdentifier: `第 ${tripData.length+1} 天`, spots: [] }); currentDayIndex = tripData.length-1; saveItinerary(); renderAll(); }
        function deleteDay(e, i) { 
            e.stopPropagation(); 
            if (tripData.length <= 1) return; 
            showModal('確認刪除', `確定要刪除第 ${i+1} 天的所有行程？`, true, () => { 
                tripData.splice(i, 1); 
                tripData.forEach((d, idx) => d.dayNameIdentifier = `第 ${idx+1} 天`); 
                if (currentDayIndex >= tripData.length) currentDayIndex = tripData.length - 1; 
                saveItinerary(); 
                renderAll(); 
            }); 
        }
        function renderItinerary() {
            const list = document.getElementById('itinerary-list'); list.innerHTML = '';
            const spots = tripData[currentDayIndex].spots;
            
            if (spots.length === 0) {
                list.innerHTML = `
                <div class="h-full flex flex-col items-center justify-center text-slate-400 opacity-60">
                    <i class="fas fa-map-location-dot text-5xl mb-4"></i>
                    <p class="text-sm font-bold">這天還沒有安排任何景點</p>
                    <p class="text-xs mt-1">點擊下方新增或匯入檔案來開始規劃吧！</p>
                </div>`;
                return;
            }
            
            spots.forEach((s, idx) => list.insertAdjacentHTML('beforeend', `<div class="drag-item p-4 bg-white rounded-xl shadow-sm border border-slate-100 flex items-center justify-between cursor-move hover:border-blue-200 transition" draggable="true" data-index="${idx}"><div class="flex items-center gap-4"><span class="w-6 h-6 bg-slate-100 rounded text-[10px] flex items-center justify-center font-bold text-slate-400">${idx+1}</span><div><b class="text-slate-700 block text-sm">${s.name}</b><span class="text-[10px] text-slate-400">${s.desc}</span></div></div><button onclick="deleteSpot(${idx})" class="text-slate-300 hover:text-red-500 p-2"><i class="fas fa-trash-alt text-xs"></i></button></div>`));
            bindDragEvents();
        }
        function addCustomSpot() { const inp = document.getElementById('new-spot-name'); const n = inp.value.trim(); if (!n) return; tripData[currentDayIndex].spots.push({ id: generateId(), name: n, desc: '自訂行程' }); saveItinerary(); renderItinerary(); inp.value = ''; }
        function deleteSpot(i) { tripData[currentDayIndex].spots.splice(i, 1); saveItinerary(); renderItinerary(); }
        function bindDragEvents() {
            const items = document.querySelectorAll('.drag-item');
            items.forEach(item => {
                item.addEventListener('dragstart', function() { draggedElement = this; this.classList.add('dragging'); });
                item.addEventListener('dragend', function() { this.classList.remove('dragging'); document.querySelectorAll('.drag-item').forEach(el => el.classList.remove('drag-over')); syncArrayFromDOM(); });
                item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('drag-over'); });
                item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
                item.addEventListener('drop', function(e) { e.preventDefault(); if (this !== draggedElement) { const all = [...document.querySelectorAll('.drag-item')]; if (all.indexOf(draggedElement) < all.indexOf(this)) this.after(draggedElement); else this.before(draggedElement); } });
            });
        }
        function syncArrayFromDOM() { const doms = document.querySelectorAll('.drag-item'); const arr = []; doms.forEach(d => arr.push(tripData[currentDayIndex].spots[parseInt(d.dataset.index, 10)])); tripData[currentDayIndex].spots = arr; saveItinerary(); renderAll(); }

        // 系統初始化入口，改為載入「所有」行程
        window.onload = loadAllTrips;

        // PWA 註冊腳本
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
              .then(reg => console.log('PWA Service Worker 註冊成功'))
              .catch(err => console.log('PWA 註冊失敗:', err));
          });
        }
    </script>
</body>
