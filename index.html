<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trippie - 旅遊行程規劃器</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        #map { z-index: 1; height: 100%; width: 100%; background: #f8fafc; }
        .custom-marker {
            background-color: #f97316;
            color: white;
            border-radius: 50%;
            text-align: center;
            font-weight: bold;
            line-height: 24px;
            border: 2px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        @media (max-width: 1024px) {
            main { flex-direction: column; }
            #map-section { height: 40vh; min-height: 250px; width: 100% !important; flex-shrink: 0; }
            #itinerary-section { width: 100% !important; flex-grow: 1; border-l: 0; border-t: 1px solid #e2e8f0; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shrink-0 shadow-sm z-50">
        <div class="flex items-center gap-2">
            <i class="ph-fill ph-map-trifold text-blue-600 text-3xl"></i>
            <h1 id="app-title" contenteditable="true" class="text-xl font-bold tracking-tight outline-none focus:text-blue-600">我的行程</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleMap()" class="p-2 hover:bg-slate-100 rounded-xl border border-slate-200 flex items-center gap-2">
                <i class="ph ph-map-trifold text-xl"></i>
                <span class="hidden md:inline font-bold text-sm">地圖開關</span>
            </button>
            <button onclick="triggerImport()" class="flex items-center gap-2 bg-blue-50 text-blue-600 px-4 py-2 rounded-xl font-bold hover:bg-blue-100 transition border border-blue-200">
                <i class="ph ph-magic-wand"></i>
                <span class="hidden sm:inline">AI 智慧匯入行程</span>
            </button>
            <input type="file" id="universal-import" class="hidden" accept=".xlsx, .xls, .csv, .txt, .json, .doc, .docx, .pdf, image/*">
            
            <div class="relative group">
                <button class="bg-slate-800 text-white px-4 py-2 rounded-xl font-bold hover:bg-slate-900 flex items-center gap-2">
                    <i class="ph ph-export"></i>
                    <span>匯出</span>
                    <i class="ph ph-caret-down"></i>
                </button>
                <div class="absolute right-0 top-full mt-2 w-48 bg-white shadow-2xl rounded-2xl border border-slate-100 py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-[100] transform origin-top-right">
                    <button onclick="exportToExcel()" class="w-full text-left px-4 py-3 hover:bg-green-50 flex items-center gap-3">
                        <i class="ph ph-file-xls text-green-500 text-xl"></i>
                        <span class="font-bold text-sm">Excel</span>
                    </button>
                    <button onclick="exportToWord()" class="w-full text-left px-4 py-3 hover:bg-blue-50 flex items-center gap-3 border-t border-slate-50">
                        <i class="ph ph-file-doc text-blue-500 text-xl"></i>
                        <span class="font-bold text-sm">Word</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex overflow-hidden">
        <div id="map-section" class="flex-grow relative h-full border-r border-slate-200">
            <div id="map"></div>
            <div class="absolute bottom-6 left-6 z-40 bg-white p-2 rounded-xl shadow-lg border flex flex-col gap-2">
                <button onclick="mapView.zoomIn()" class="p-2 hover:bg-slate-100 rounded-lg"><i class="ph ph-plus"></i></button>
                <button onclick="mapView.zoomOut()" class="p-2 hover:bg-slate-100 rounded-lg"><i class="ph ph-minus"></i></button>
                <button onclick="updateMap()" class="p-2 hover:bg-slate-100 rounded-lg border-t"><i class="ph ph-arrows-out"></i></button>
            </div>
        </div>

        <div id="itinerary-section" class="w-full lg:w-[500px] border-l border-slate-200 bg-white flex flex-col shrink-0 h-full">
            <div class="border-b border-slate-100 px-4 py-2 flex items-center justify-between bg-slate-50 shrink-0">
                <div class="flex gap-2 overflow-x-auto no-scrollbar" id="day-tabs"></div>
                <div class="flex gap-1 ml-2">
                    <button onclick="addDay()" class="p-1.5 bg-blue-100 text-blue-600 rounded-md"><i class="ph ph-plus-circle"></i></button>
                    <button onclick="removeDay()" class="p-1.5 bg-rose-100 text-rose-600 rounded-md"><i class="ph ph-trash"></i></button>
                </div>
            </div>
            <div id="itinerary-list" class="flex-grow overflow-y-auto p-6 space-y-8"></div>
            <div class="p-4 border-t border-slate-100 bg-white">
                <button onclick="addSpot()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">
                    <i class="ph ph-plus-bold mr-2"></i>新增行程
                </button>
            </div>
        </div>
    </main>

    <div id="modal-container" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity">
        <div class="bg-white rounded-2xl p-6 w-80 shadow-2xl transform scale-90 transition-transform" id="modal-content">
            <h3 id="modal-title" class="text-lg font-bold mb-2">確認視窗</h3>
            <p id="modal-desc" class="text-slate-500 mb-6"></p>
            <div id="modal-input-area" class="hidden mb-4">
                <input id="modal-input" type="text" class="w-full border p-2 rounded-lg outline-none" placeholder="請輸入...">
            </div>
            <div class="flex gap-2 justify-end">
                <button id="modal-cancel" class="px-4 py-2 text-slate-400 font-bold">取消</button>
                <button id="modal-confirm" class="px-4 py-2 bg-blue-600 text-white rounded-xl font-bold">確定</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { GoogleGenAI } from "https://esm.run/@google/genai";

        window.handleUniversalImport = async function(file) {
            if (!file) return;

            const overlay = document.createElement('div');
            overlay.className = "fixed inset-0 bg-black/70 backdrop-blur-md z-[200] flex flex-col items-center justify-center p-6 text-white";
            overlay.innerHTML = `
                <div class="flex flex-col items-center gap-6">
                    <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent animate-spin rounded-full"></div>
                    <div class="text-xl font-bold">AI 正在解析您的行程清單...</div>
                    <div id="ai-status" class="text-blue-300">正在讀取：${file.name}</div>
                </div>
            `;
            document.body.appendChild(overlay);

            try {
                // API KEY 獲取邏輯
                let apiKey = "[[GEMINI_API_KEY]]"; // 嘗試環境變數
                if (typeof process !== 'undefined' && process.env.GEMINI_API_KEY) {
                    apiKey = process.env.GEMINI_API_KEY;
                } else if (apiKey === "[[GEMINI_API_KEY]]" || apiKey === "") {
                    apiKey = localStorage.getItem('trippie_api_key');
                    if (!apiKey) {
                        apiKey = prompt("請輸入您的 Gemini API Key 以啟用 AI 功能：");
                        if (apiKey) localStorage.setItem('trippie_api_key', apiKey);
                    }
                }

                if (!apiKey) throw new Error("缺少 API Key");

                const genAI = new GoogleGenAI(apiKey);
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash",
                    generationConfig: { responseMimeType: "application/json" }
                });

                const ext = file.name.split('.').pop().toLowerCase();
                let contentPart;

                if (file.type.startsWith('image/')) {
                    const base64 = await toBase64(file);
                    contentPart = { inlineData: { data: base64.split(',')[1], mimeType: file.type } };
                } else if (ext === 'docx') {
                    const res = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
                    contentPart = { text: res.value };
                } else if (ext === 'xlsx' || ext === 'xls') {
                    const data = await file.arrayBuffer();
                    const wb = XLSX.read(data);
                    contentPart = { text: JSON.stringify(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])) };
                } else {
                    contentPart = { text: await file.text() };
                }

                const promptText = `
                    分析以下行程內容，識別出所有的景點名稱、天數與大致時間。
                    格式必須為 JSON 陣列，物件包含 day (數字) 及 spots (陣列)。
                    [
                      {
                        "day": 1,
                        "spots": [
                          {"name": "景點名稱", "time": "HH:mm", "duration": "停留分鐘"}
                        ]
                      }
                    ]
                    重要提示：
                    1. 如果文中有「第一天、第二天」等標記，請準確對應天數。
                    2. 如果沒有時間，請按順序從 09:00 開始每景點加 2 小時。
                `;

                const result = await model.generateContent([contentPart, { text: promptText }]);
                const parsedData = JSON.parse(result.response.text());

                // 進行地理定位與處理
                const finalDays = await Promise.all(parsedData.map(async (dGroup) => {
                    const spots = await Promise.all(dGroup.spots.map(async (s) => {
                        const info = await window.fetchPlaceInfo(s.name);
                        return {
                            id: Date.now() + Math.random(),
                            name: s.name,
                            time: s.time || "10:00",
                            duration: s.duration || "60",
                            img: info.img,
                            lat: info.lat || 36.5613, // 金澤預設緯度
                            lng: info.lng || 136.6562  // 金澤預設經度
                        };
                    }));
                    return { spots };
                }));

                overlay.remove();
                window.showModal({
                    title: "匯入成功",
                    desc: `AI 已識別出 ${finalDays.length} 天行程，共 ${finalDays.reduce((a,b)=>a+b.spots.length,0)} 個景點。要替換目前行程嗎？`,
                    onConfirm: (confirm) => {
                        if (confirm) {
                            window.records.days = finalDays;
                            window.records.activeDay = 0;
                            window.records.title = file.name.split('.')[0];
                        } else {
                            window.records.days.push(...finalDays);
                        }
                        window.render();
                    }
                });

            } catch (err) {
                console.error(err);
                overlay.remove();
                alert("解析失敗，請確認 API Key 有效或文件內容正常。");
            }
        };

        function toBase64(file) {
            return new Promise((r, j) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => r(reader.result);
                reader.onerror = e => j(e);
            });
        }
    </script>

    <script>
        window.records = {
            title: "我的冒險之旅",
            activeDay: 0,
            days: [{ spots: [] }]
        };

        let map, markersLayer, polyline;

        window.onload = () => {
            initMap();
            loadLocal();
            render();
        };

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([36.5613, 136.6562], 13);
            L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            setTimeout(() => map.invalidateSize(), 500);
        }

        window.render = function() {
            const r = window.records;
            document.getElementById('app-title').innerText = r.title;
            
            const tabs = document.getElementById('day-tabs');
            tabs.innerHTML = '';
            r.days.forEach((_, i) => {
                const b = document.createElement('button');
                b.className = `px-4 py-1 rounded-full text-sm font-bold border transition ${r.activeDay === i ? 'bg-blue-600 text-white' : 'bg-white text-slate-500'}`;
                b.innerText = `第 ${i+1} 天`;
                b.onclick = () => { r.activeDay = i; render(); };
                tabs.appendChild(b);
            });

            const list = document.getElementById('itinerary-list');
            const currentSpots = r.days[r.activeDay]?.spots || [];
            list.innerHTML = `<h2 class="text-xl font-bold mb-4">第 ${r.activeDay+1} 天</h2><div id="drag-box" class="space-y-4"></div>`;
            const box = document.getElementById('drag-box');

            if (currentSpots.length === 0) {
                box.innerHTML = `<div class="text-center py-20 text-slate-300">尚無景點，請點下方按鈕或匯入行程</div>`;
            }

            currentSpots.forEach((s, idx) => {
                const d = document.createElement('div');
                d.className = "flex gap-4 p-4 bg-white border border-slate-200 rounded-xl shadow-sm spot-card";
                d.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold shrink-0">${idx+1}</div>
                    <div class="flex-grow">
                        <div class="flex justify-between">
                            <input onchange="updateSpot(${s.id}, 'name', this.value)" class="font-bold outline-none border-b border-transparent focus:border-blue-300 w-full" value="${s.name}">
                            <button onclick="removeSpot(${s.id})" class="text-slate-300 hover:text-red-500"><i class="ph ph-trash"></i></button>
                        </div>
                        <div class="flex gap-4 text-xs mt-2 text-slate-400">
                            <span>${s.time}</span>
                            <span>${s.duration} 分鐘</span>
                        </div>
                    </div>
                `;
                box.appendChild(d);
            });

            updateMap();
            saveLocal();
        };

        window.fetchPlaceInfo = async function(name) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name)}&limit=1`, { headers: { 'User-Agent': 'TrippieApp/1.0' } });
                const d = await res.json();
                return {
                    lat: d[0] ? parseFloat(d[0].lat) : null,
                    lng: d[0] ? parseFloat(d[0].lon) : null,
                    img: `https://loremflickr.com/400/300/${encodeURIComponent(name)},travel?lock=${Math.floor(Math.random()*1000)}`
                };
            } catch { return { img: 'https://via.placeholder.com/400x300?text=No+Image' }; }
        }

        function updateMap() {
            if (!map) return;
            markersLayer.clearLayers();
            if (polyline) map.removeLayer(polyline);
            const spots = window.records.days[window.records.activeDay]?.spots || [];
            const coords = [];
            spots.forEach((s, i) => {
                if (s.lat) {
                    const icon = L.divIcon({ className: 'custom-marker', html: `<div>${i+1}</div>`, iconSize: [24,24] });
                    L.marker([s.lat, s.lng], { icon }).addTo(markersLayer).bindPopup(s.name);
                    coords.push([s.lat, s.lng]);
                }
            });
            if (coords.length > 1) {
                polyline = L.polyline(coords, { color: '#f97316', weight: 4, dashArray: '5,10' }).addTo(map);
                map.fitBounds(polyline.getBounds(), { padding: [50,50] });
            } else if (coords.length === 1) map.setView(coords[0], 15);
        }

        window.showModal = function({ title, desc, showInput, onConfirm }) {
            const modal = document.getElementById('modal-container');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            const inputArea = document.getElementById('modal-input-area');
            const input = document.getElementById('modal-input');
            if (showInput) inputArea.classList.remove('hidden'); else inputArea.classList.add('hidden');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
            document.getElementById('modal-confirm').onclick = () => { if(onConfirm) onConfirm(showInput ? input.value : true); modal.classList.add('hidden'); };
            document.getElementById('modal-cancel').onclick = () => { if(onConfirm) onConfirm(false); modal.classList.add('hidden'); };
        }

        window.addDay = () => { window.records.days.push({ spots: [] }); window.records.activeDay = window.records.days.length-1; render(); };
        window.removeDay = () => { if(window.records.days.length > 1) { window.records.days.splice(window.records.activeDay, 1); window.records.activeDay = 0; render(); } };
        window.addSpot = () => window.showModal({ title: "新增景點", showInput: true, onConfirm: async (n) => { if(n){ const info = await fetchPlaceInfo(n); window.records.days[window.records.activeDay].spots.push({ id: Date.now(), name: n, time: "10:00", duration: "60", img: info.img, lat: info.lat, lng: info.lng }); render(); } }});
        window.removeSpot = (id) => { window.records.days[window.records.activeDay].spots = window.records.days[window.records.activeDay].spots.filter(s => s.id !== id); render(); };
        window.updateSpot = (id, f, v) => { const s = window.records.days[window.records.activeDay].spots.find(x => x.id === id); if(s) { s[f] = v; render(); } };
        window.toggleMap = () => document.getElementById('map-section').classList.toggle('hidden');
        window.triggerImport = () => document.getElementById('universal-import').click();
        document.getElementById('universal-import').onchange = (e) => window.handleUniversalImport(e.target.files[0]);

        function saveLocal() { localStorage.setItem('trippie_data', JSON.stringify(window.records)); }
        function loadLocal() { const d = localStorage.getItem('trippie_data'); if(d) { window.records = JSON.parse(d); } }
        
        window.exportToExcel = () => {
            const data = [];
            window.records.days.forEach((d, i) => d.spots.forEach(s => data.push({ "天數": i+1, "時間": s.time, "景點": s.name })));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "行程");
            XLSX.writeFile(wb, "行程表.xlsx");
        };

        window.mapView = { zoomIn: () => map.zoomIn(), zoomOut: () => map.zoomOut() };
    </script>
</body>
</html>
